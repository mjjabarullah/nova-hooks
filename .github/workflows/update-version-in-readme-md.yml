name: Update README with Latest Release Version
permissions:
  contents: write
on:
  release:
    types: [published, edited]
  push:
    tags:
      - "v*"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed so we have branch history
          ref: main # Change to your default branch (e.g., master)

      - name: Capture release version
        id: get_version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Update readme.md
        run: |
          search="nova-hooks.git#.*"
          replace="nova-hooks.git#${{ steps.get_version.outputs.version }}"
          sed -i "s|$search|$replace|" readme.md

      - name: Update package.json version
        run: |
          # Strip the 'v' prefix if it exists (e.g. 'v1.0.7' -> '1.0.7')
          clean_version=$(echo "${{ steps.get_version.outputs.version }}" | sed 's/^v//')
          npm --no-git-tag-version --allow-same-version version $clean_version

      - name: Commit changes if any
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump version in README and package.json to ${{ steps.get_version.outputs.version }}"
          git pull --rebase origin main
          git push origin main
